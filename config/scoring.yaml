# ============================================================================
# Configuração de Pontuação — Bolão da Copa 2026
# ----------------------------------------------------------------------------
# Este arquivo é a ÚNICA fonte da verdade das regras de pontuação.
# Edite os números aqui e o app (cálculo + página de regras) acompanha.
# Os valores são validados por schema no carregamento — se digitar algo
# inválido (texto onde espera número, etc.), o app avisa em vez de calcular errado.
# ============================================================================

# --- Política de travamento dos palpites ------------------------------------
# DECIDIDO: o palpite pode ser editado até a HORA EXATA do apito inicial de
# cada jogo. Depois disso, trava. (per_game)
#
# per_game  = cada jogo trava no seu próprio apito inicial. [EM USO]
# per_phase = todos os palpites de uma fase travam quando a fase começa.
lock_policy: per_game

# --- Base do placar no mata-mata --------------------------------------------
# Pênaltis NÃO contam para o placar do palpite. O que vale é:
#   regular_plus_extra_time = tempo normal + prorrogação
#   regular_only            = só tempo normal
knockout_score_basis: regular_plus_extra_time

# --- Pontos por nível de acerto (placar de um jogo) -------------------------
# Aplicados sobre o resultado de cada partida e depois multiplicados pelo
# peso da fase (ver phase_weights).
points:
  exact_score: 5          # 🎯 Placar exato ("na mosca")
  winner_and_goal_diff: 3 # ↔️ Acertou o vencedor E a diferença de gols
  winner_only: 2          # ✅ Acertou só o vencedor (ou que foi empate)
  miss: 0                 # ❌ Errou o resultado

# --- Peso por fase ----------------------------------------------------------
# O total do jogo = pontos do nível de acerto × peso da fase.
# Pesos fracionados (mata-mata vale progressivamente mais).
# Calibrados para que grupos e mata-mata somem ~360 pts cada (50%/50% do total),
# com o mata-mata crescendo progressivamente até a final ter o maior peso.
phase_weights:
  group: 1.0          # Fase de grupos        → 72 jogos × 5 ×1.0 = 360 pts
  round_of_32: 1.0    # 32 avos               → 16 ×5 ×1.0 =  80 pts
  round_of_16: 2.0    # Oitavas de final      →  8 ×5 ×2.0 =  80 pts
  quarter_finals: 4.0 # Quartas de final      →  4 ×5 ×4.0 =  80 pts
  semi_finals: 5.5    # Semifinais            →  2 ×5 ×5.5 =  55 pts
  third_place: 5.5    # Disputa de 3º lugar (mesmo peso da semi) → 27,5 pts
  final: 7.5          # Final                 →  1 ×5 ×7.5 = 37,5 pts

# Arredondar pontos fracionados para inteiro? (ex.: 7.5 -> 8)
round_points_to_integer: false

# Sem bônus: o bolão é só pelos placares dos jogos. (Sem palpite de campeão/
# artilheiro e sem bônus de "quem avança" no mata-mata.)

# --- Palpite em branco ------------------------------------------------------
# Pontos para quem não palpitou antes do jogo travar.
# 0 = neutro (sugerido). Negativo = penalidade.
blank_prediction_points: 0

# --- Critérios de desempate (ordem importa) ---------------------------------
tiebreakers:
  - total_points     # 1º maior pontuação total
  - exact_scores     # 2º mais placares cravados
  - correct_results  # 3º mais resultados certos
  # empate restante: posição dividida (ou sorteio — a definir)
